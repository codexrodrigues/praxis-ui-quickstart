<div class="shell" [attr.data-theme]="activeTheme()">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <img class="brand-logo" src="/brand/praxis-mark-dark.png" alt="Praxis" />
      <span class="brand-copy">
        <strong>Praxis UI Quickstart</strong>
        <small>Angular host + Praxis platform</small>
      </span>
    </a>

    <div class="topbar-actions">
      <nav class="topnav" aria-label="Quickstart navigation">
        <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/examples/table" routerLinkActive="is-active">Table</a>
        <a routerLink="/examples/form" routerLinkActive="is-active">Form</a>
        <a routerLink="/examples/crud" routerLinkActive="is-active">CRUD</a>
        <a routerLink="/examples/list" routerLinkActive="is-active">List</a>
      </nav>

      <div class="theme-switcher" role="group" aria-label="Host theme switcher">
        <button type="button" [class.is-active]="activeTheme() === 'default'" (click)="setTheme('default')">Default</button>
        <button type="button" [class.is-active]="activeTheme() === 'corporate'" (click)="setTheme('corporate')">Corporate</button>
        <button type="button" [class.is-active]="activeTheme() === 'high-contrast'" (click)="setTheme('high-contrast')">High contrast</button>
      </div>

      <label class="customization-toggle">
        <span class="toggle-copy">
          <strong>Customization</strong>
          <small>{{ customizationEnabled() ? 'On' : 'Off' }}</small>
        </span>
        <input
          type="checkbox"
          [ngModel]="customizationEnabled()"
          (ngModelChange)="setCustomizationEnabled($event)"
          aria-label="Toggle customization mode"
        />
        <span class="toggle-track" aria-hidden="true"></span>
      </label>
    </div>
  </header>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>
